{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-5">
        <!-- Логотип над карточкой -->
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="LinkVision" style="height: 240px; width: auto;" class="img-fluid">
        </div>

        <!-- Карточка входа -->
        <div class="admin-card mb-4">
            <div class="card-header">
                <i class="fas fa-sign-in-alt"></i> Вход в систему
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Имя пользователя</label>
                        <input type="text" name="username" class="form-control" placeholder="Введите логин" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Пароль</label>
                        <div class="password-field-wrapper">
                            <input type="password" name="password" id="login_password" class="form-control" placeholder="Введите пароль" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePassword('login_password')"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt me-2"></i> Войти
                    </button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none">Нет аккаунта? Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const wrapper = field.closest('.password-field-wrapper');
    const icon = wrapper.querySelector('.toggle-password');
    if (field.type === "password") {
        field.type = "text";
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        field.type = "password";
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}
</script>
{% endblock %}
