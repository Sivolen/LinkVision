{% extends "base.html" %}
{% block content %}
<h2>Все карты системы</h2>
<table class="table table-striped shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Владелец</th>
            <th>Дата создания</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for map in maps %}
        <tr>
            <td>{{ map.id }}</td>
            <td>{{ map.name }}</td>
            <td>{{ map.owner.username }}</td>
            <td>{{ map.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
            <td>
                <a href="{{ url_for('main.map_view', map_id=map.id) }}" class="btn btn-sm btn-outline-primary">Открыть</a>
                <a href="{{ url_for('admin.delete_map', id=map.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить карту и все устройства?')">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
