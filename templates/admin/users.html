{% extends "base.html" %}
{% block content %}
<h2>Управление пользователями</h2>
<div class="card mb-4 shadow-sm">
    <div class="card-body">
        <form action="{{ url_for('admin.create_user') }}" method="POST" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="username" class="form-control" placeholder="Логин" required>
            </div>
            <div class="col-md-4">
                <input type="password" name="password" class="form-control" placeholder="Пароль" required>
            </div>
            <div class="col-md-2">
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" name="is_admin" id="isAdmin">
                    <label class="form-check-label" for="isAdmin">Админ</label>
                </div>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-success w-100">Добавить</button>
            </div>
        </form>
    </div>
</div>

<table class="table table-striped shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Админ</th>
            <th>Дата создания</th>
            <th>Действия</th>
        </tr>
    </thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ 'Да' if user.is_admin else 'Нет' }}</td>
            <td>{{ user.created_at.strftime('%Y-%m-%d') }}</td>
            <td>
                <a href="{{ url_for('admin.delete_user', id=user.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('Удалить пользователя?')">Удалить</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
